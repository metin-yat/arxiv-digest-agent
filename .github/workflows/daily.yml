name: Daily ArXiv Research Digest

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI

jobs:
  digest:
    name: Fetch, Score & Send Digest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ArXiv Digest Agent
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python arxiv_digest_agent.py

      - name: Upload HTML digest artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-digest-html
          path: /tmp/arxiv_digest_latest.html
          retention-days: 7
          if-no-files-found: ignore
